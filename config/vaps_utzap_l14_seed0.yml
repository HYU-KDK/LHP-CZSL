model:
  model_name: vaps
  prompt_template: ["a photo of x x", "a photo of x", "a photo of x"]
  ctx_init: ["a photo of ", "a photo of ", "a photo of "]
  clip_model: "ViT-L/14"
  clip_arch: "ViT-L/14"
  repo_size: 20
  top_n_prompts: 2
  adapter_hidden: 128
  fusion_heads: 4
  lambda_attr_obj: 1.0
  lambda_sp: 1.0
  lambda_ret: 1.0
  pair_inference_weight: 1.0
  attr_inference_weight: 1.0
  obj_inference_weight: 1.0

train:
  dataset: ut-zap50k
  dataset_path: /data1/workspaces/jgshin22/LHP-CZSL/data/ut-zappos
  optimizer: Adam
  scheduler: StepLR
  step_size: 5
  gamma: 0.5
  lr: 0.0001
  attr_dropout: 0.3
  weight_decay: 0.00005
  context_length: 8
  train_batch_size: 8
  gradient_accumulation_steps: 8
  seed: 0
  epochs: 15
  epoch_start: 0
  save_path: checkpoint/vaps_l14_utzap_seed0
  save_every_n: 1
  val_metric: best_hm
  save_final_model: True

test:
  eval_batch_size: 32
  open_world: False
  topk: 1
  text_encoder_batch_size: 32
  threshold_trials: 50
  bias: 0.001
  text_first: True
